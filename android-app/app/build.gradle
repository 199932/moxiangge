plugins {
    id 'com.android.application' version '8.1.4'
}

android {
    namespace 'com.moxiangge.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.moxiangge.app"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    signingConfigs {
        release {
            storeFile file("../moxiangge-release.keystore")
            storePassword "moxiangge2026"
            keyAlias "moxiangge"
            keyPassword "moxiangge2026"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
