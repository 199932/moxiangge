<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨香阁 · 笔墨留香之地</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header class="site-header">
        <div class="title-block">
            <h1 class="site-title">墨香阁</h1>
            <p class="site-subtitle">笔墨留香 · 文人汇聚</p>
        </div>
        <nav class="nav-bar">
            <a href="index.html" class="nav-btn active">文章阁</a>
            <a href="write.html" class="nav-btn">提笔写作</a>
        </nav>
    </header>

    <main class="content">
        <div class="intro-card">
            <h2>欢迎来到墨香阁</h2>
            <p>这里是一方笔墨留香之地。在这里，你可以挥毫泼墨，写下心中的故事；也可以漫步书海，品读他人的笔墨精华。</p>
            <p class="intro-tip">文章按时间排序，最新更新在最上方。</p>
        </div>

        <div class="articles-section">
            <h2 class="section-title">📖 文章阁</h2>
            <div id="articles-list" class="articles-list">
                <div class="loading">正在加载文章...</div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>墨香阁 · 墨香四溢 · 笔下生花</p>
        <p class="copyright">v1.1 · GitHub Pages</p>
    </footer>
</div>

<script>
const GITHUB_USER = '199932';
const GITHUB_REPO = 'moxiangge';
const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}`;
const ARTICLES_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/articles.json`;
// 备用：直接从 Pages 网址加载
const FALLBACK_URL = `${BASE_URL}/articles.json`;

function formatDate(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}

function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
}

function renderArticles(articles) {
    const list = document.getElementById('articles-list');
    if (!articles || articles.length === 0) {
        list.innerHTML = '<div class="empty">暂无文章，点击「提笔写作」发布第一篇吧！</div>';
        return;
    }
    // 按时间倒序
    articles.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
    list.innerHTML = articles.map(a => `
        <a class="article-card" href="read.html?id=${encodeURIComponent(a.id)}">
            <div class="article-header">
                <h3 class="article-title">${escapeHtml(a.title)}</h3>
                <span class="article-category">${escapeHtml(a.category || '随笔')}</span>
            </div>
            <p class="article-preview">${escapeHtml((a.content || '').substring(0, 120))}${(a.content||'').length > 120 ? '...' : ''}</p>
            <div class="article-meta">
                <span>✍️ ${escapeHtml(a.author || '匿名')}</span>
                <span>📅 ${formatDate(a.createdAt || Date.now())}</span>
                <span>👁️ ${a.views || 0} 阅读</span>
            </div>
        </a>
    `).join('');
}

function loadArticles() {
    const list = document.getElementById('articles-list');
    list.innerHTML = '<div class="loading">正在加载文章...</div>';
    
    // 先尝试从 raw.githubusercontent 加载，失败则从 Pages URL 尝试
    fetch(ARTICLES_URL, { cache: 'no-store' })
        .then(r => {
            if (!r.ok) throw new Error('加载失败');
            return r.json();
        })
        .then(data => {
            renderArticles(data.articles || data);
        })
        .catch(() => {
            // 备用：从 Pages URL 加载
            fetch(FALLBACK_URL + '?t=' + Date.now())
                .then(r => r.ok ? r.json() : Promise.reject('失败'))
                .then(data => renderArticles(data.articles || data))
                .catch(() => {
                    list.innerHTML = '<div class="empty">文章加载失败，请稍后刷新重试。</div>';
                });
        });
}

loadArticles();
</script>
</body>
</html>
